<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8eeff;stop-opacity:0.95"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bg)"/>
  
  <!-- Cloud shape -->
  <g transform="translate(30, 45)">
    <!-- Main cloud body -->
    <ellipse cx="70" cy="75" rx="55" ry="35" fill="url(#cloud)"/>
    <ellipse cx="45" cy="68" rx="32" ry="28" fill="url(#cloud)"/>
    <ellipse cx="90" cy="60" rx="28" ry="25" fill="url(#cloud)"/>
    
    <!-- Camera/photo icon inside cloud -->
    <rect x="42" y="62" width="56" height="40" rx="6" fill="#667eea" opacity="0.9"/>
    <circle cx="70" cy="82" r="12" fill="white" opacity="0.95"/>
    <circle cx="70" cy="82" r="8" fill="#667eea"/>
    <circle cx="70" cy="82" r="4" fill="white"/>
    <rect x="80" y="66" width="12" height="6" rx="2" fill="white" opacity="0.8"/>
    
    <!-- Upload arrow below cloud -->
    <line x1="70" y1="110" x2="70" y2="130" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <polyline points="58,120 70,108 82,120" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>